<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Котомания AI Studio</title>
    <!-- Базовые скрипты: React и Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root { --brand: #db9d2b; --bg: #0f172a; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; margin:0; font-family: -apple-system, system-ui, sans-serif; }
        .app-container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .btn-main { width: 100%; background: var(--brand); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        .input-text { width:100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 10px; margin-top: 8px; font-size: 14px; }
        .tabs { display: flex; background: var(--glass); padding: 5px; border-radius: 15px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 10px; font-size: 14px; cursor: pointer; }
        .tab.active { background: rgba(255,255,255,0.1); font-weight: bold; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .label { font-size: 12px; opacity: 0.6; display: block; margin-top: 15px; }
        .status-error { background: #7f1d1d; padding: 20px; border-radius: 10px; margin: 20px; }
    </style>
</head>
<body>
    <div id="root">
        <div style="text-align:center; padding-top:100px;">
            <div style="font-size:40px">🐈</div>
            <p>Запуск Студии Котомании...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [model, setModel] = useState('kling');
            const [prompt, setPrompt] = useState('');
            const [ratio, setRatio] = useState('9:16');

            useEffect(() => {
                try {
                    if (window.Telegram && window.Telegram.WebApp) {
                        window.Telegram.WebApp.ready();
                        window.Telegram.WebApp.expand();
                    }
                } catch(e) { console.error(e); }
            }, []);

            const generate = () => {
                const data = { model, prompt, ratio, v: '2.1' };
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.sendData(JSON.stringify(data));
                    window.Telegram.WebApp.close();
                } else {
                    alert('Данные готовы: ' + JSON.stringify(data));
                }
            };

            return (
                <div className="app-container">
                    <div style={{textAlign:'center', marginBottom:20}}>
                        <h2 style={{margin:0, color:'var(--brand)'}}>Котомания AI Studio</h2>
                        <p style={{fontSize:10, opacity:0.3}}>v2.1 Stable</p>
                    </div>

                    <div className="card">
                        <label className="label" style={{marginTop:0}}>ВЫБЕРЕТЕ МОДЕЛЬ</label>
                        <select className="input-text" value={model} onChange={e => setModel(e.target.value)}>
                            <option value="kling">Kling 2.5 Turbo</option>
                            <option value="banana">Banana PRO</option>
                            <option value="luma">Luma Dream</option>
                        </select>

                        <label className="label">ФОРМАТ</label>
                        <div className="grid-2" style={{marginTop:8}}>
                            <button onClick={()=>setRatio('9:16')} style={{background: ratio==='9:16'?'rgba(255,255,255,0.2)':'transparent'}} className="tab">📱 9:16</button>
                            <button onClick={()=>setRatio('1:1')} style={{background: ratio==='1:1'?'rgba(255,255,255,0.2)':'transparent'}} className="tab">🟦 1:1</button>
                        </div>
                    </div>

                    <div className="card">
                        <label className="label" style={{marginTop:0}}>ЧТО СОЗДАТЬ?</label>
                        <textarea 
                            className="input-text" 
                            rows="4" 
                            placeholder="Напишите запрос..."
                            value={prompt}
                            onChange={e => setPrompt(e.target.value)}
                        />
                    </div>

                    <button className="btn-main" onClick={generate}>
                        Создать Видео 🚀
                    </button>

                    <p style={{textAlign:'center', fontSize:10, opacity:0.2, marginTop:20}}>
                        ID: {window.Telegram?.WebApp?.initDataUnsafe?.user?.id || 'demo'}
                    </p>
                </div>
            );
        }

        try {
            ReactDOM.render(<App />, document.getElementById('root'));
        } catch(e) {
            document.getElementById('root').innerHTML = `<div class="status-error">Ошибка: ${e.message}</div>`;
        }
    </script>
</body>
</html>
